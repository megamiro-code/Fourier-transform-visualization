<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フーリエ変換 可視化ツール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d1a;--surface:#13131f;--surface2:#1c1c2e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e8e8f0;--text2:#8888a8;
  --accent:#4a90d9;--accent2:#7b6cf6;--green:#3ecf8e;--red:#f66c6c;
  --cbg:#0a0a14;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:16px 24px;border-bottom:0.5px solid var(--border);display:flex;align-items:baseline;gap:12px;background:var(--surface);}
header h1{font-size:18px;font-weight:600;letter-spacing:-.02em;}
header p{font-size:13px;color:var(--text2);}
.app{padding:24px;display:flex;flex-direction:column;gap:20px;max-width:1000px;margin:0 auto;}

/* 2x2 grid for larger visualization */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;align-items:start;}
.panel{display:flex;flex-direction:column;gap:8px;}
.lbl{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);}
.sq{position:relative;width:100%;aspect-ratio:1/1;border:1px solid var(--border2);border-radius:8px;overflow:hidden;background:var(--cbg);}
.sq canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;}

/* dropzone */
#dropSq{cursor:pointer;}
#dropHint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--text2);z-index:2;pointer-events:none;transition:opacity .2s;}
#dropSq.over #dropHint{color:var(--green);}
#dropSq.hasimg #dropHint{opacity:0;}

/* freq canvas cursor */
#freqSq{cursor:crosshair;}

/* controls */
.ctrl{display:flex;flex-direction:column;gap:10px;padding-top:8px;}
.btn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
button{font-size:13px;font-weight:500;padding:6px 14px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;}
button:hover{background:rgba(255,255,255,0.08);}
button.active{background:rgba(74,144,217,0.18);border-color:var(--accent);color:var(--accent);}
.sl-row{display:flex;align-items:center;gap:10px;flex:1;max-width:250px;}
.sl-row input[type=range]{flex:1;accent-color:var(--accent);}
.sl-row span{font-size:13px;color:var(--text2);min-width:24px;text-align:right;}
.prog-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .1s;}
.info{font-size:13px;color:var(--text2);line-height:1.55;}
.hint{font-size:13px;color:var(--text2);line-height:1.6;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.hint strong{color:var(--text);font-weight:600;}

/* loading */
#ov{display:none;position:fixed;inset:0;background:rgba(13,13,26,.8);z-index:99;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-size:14px;color:var(--text2);}
#ov.show{display:flex;}
.spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<header>
  <h1>フーリエ変換 可視化ツール</h1>
  <p>FFT で高速処理 — 周波数マップ座標から波を選択 → 逆変換で復元</p>
</header>

<div class="app">
  <div class="grid">

    <div class="panel">
      <div class="lbl">① 元画像</div>
      <div class="sq" id="dropSq">
        <canvas id="prevCv"></canvas>
        <div id="dropHint">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span style="text-align:center;">ドラッグ＆ドロップ<br>またはクリック</span>
        </div>
      </div>
      <input type="file" id="fileIn" accept="image/*" style="display:none;">
    </div>

    <div class="panel">
      <div class="lbl">② 周波数マップ (FFT)</div>
      <div class="sq" id="freqSq">
        <canvas id="freqCv"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="lbl">③ 最後に選択した波形</div>
      <div class="sq">
        <canvas id="waveCv"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="lbl">④ 合成画像（重ね合わせ）</div>
      <div class="sq">
        <canvas id="ifftCv"></canvas>
      </div>
    </div>

  </div>

  <div class="ctrl">
    <div class="btn-row">
      <span class="info" style="margin-right:4px;">モード:</span>
      <button id="btnBrush" class="active">ブラシ</button>
      <button id="btnErase">消去</button>
      <button id="btnFull">全選択</button>
      <button id="btnReset">リセット</button>
      <div class="sl-row" style="margin-left:20px;">
        <span class="info">サイズ</span>
        <input type="range" min="0" max="20" value="2" id="bsz">
        <span id="bszLbl">2</span>
      </div>
      <span class="info" style="margin-left:auto;" id="progTxt">選択済み: 0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="hint">
    💡 <strong>使い方:</strong>
    ②の周波数マップをドラッグして成分を選択。
    <strong>直近で塗った領域</strong>（赤色）から生成される波が③に表示され、
    <strong>これまでに選択したすべての成分</strong>（青色）を重ね合わせた結果が④に表示されます。
  </div>
</div>

<div id="ov"><div class="spin"></div><span id="ovTxt">FFT 計算中...</span></div>

<script>
(function(){
'use strict';

/* N must be power of 2 (Increased resolution to 256) */
const N = 256;

let gray = null;
let FR   = null;  // FFT real (fftshifted), Float32Array N*N
let FI   = null;  // FFT imag (fftshifted)
let mask = new Uint8Array(N*N);
let currentStrokeMask = new Uint8Array(N*N); // 直近のストロークを保存
let mode = 'brush', bsz = 2, drag = false, isDrawing = false;

const dropSq = document.getElementById('dropSq');
const fileIn = document.getElementById('fileIn');
const prevCv = document.getElementById('prevCv');
const freqSq = document.getElementById('freqSq');
const freqCv = document.getElementById('freqCv');
const waveCv = document.getElementById('waveCv');
const ifftCv = document.getElementById('ifftCv');
const ov     = document.getElementById('ov');
const ovTxt  = document.getElementById('ovTxt');

[prevCv, freqCv, waveCv, ifftCv].forEach(c => { c.width = N; c.height = N; });

/* ── controls ── */
document.getElementById('btnBrush').onclick = () => setMode('brush');
document.getElementById('btnErase').onclick = () => setMode('erase');
document.getElementById('btnReset').onclick = () => { mask.fill(0); currentStrokeMask.fill(0); refresh(); };
document.getElementById('btnFull' ).onclick = () => { mask.fill(1); currentStrokeMask.fill(0); refresh(); };
document.getElementById('bsz').oninput = e => {
  bsz = +e.target.value;
  document.getElementById('bszLbl').textContent = bsz;
};

function setMode(m) {
  mode = m;
  ['btnBrush','btnErase'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(m === 'brush' ? 'btnBrush' : 'btnErase').classList.add('active');
}

/* ── file load ── */
dropSq.onclick = () => fileIn.click();
dropSq.ondragover  = e => { e.preventDefault(); dropSq.classList.add('over'); };
dropSq.ondragleave = () => dropSq.classList.remove('over');
dropSq.ondrop = e => {
  e.preventDefault(); dropSq.classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};
fileIn.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

function loadFile(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const tmp = document.createElement('canvas'); tmp.width = N; tmp.height = N;
    const tc = tmp.getContext('2d');
    tc.drawImage(img, 0, 0, N, N);
    const d = tc.getImageData(0, 0, N, N).data;
    gray = new Float32Array(N * N);
    for (let i = 0; i < N * N; i++)
      gray[i] = (d[i*4] * .299 + d[i*4+1] * .587 + d[i*4+2] * .114) / 255;
    URL.revokeObjectURL(url);
    prevCv.getContext('2d').drawImage(tmp, 0, 0);
    dropSq.classList.add('hasimg');
    mask.fill(0);
    currentStrokeMask.fill(0);
    runFFT();
  };
  img.src = url;
}

/* ════════════════════════════════
   Cooley-Tukey FFT (radix-2)
   ════════════════════════════════ */
function fft1d(re, im, inv) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      [re[i], re[j]] = [re[j], re[i]];
      [im[i], im[j]] = [im[j], im[i]];
    }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = (inv ? 2 : -2) * Math.PI / len;
    const wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let cRe = 1, cIm = 0;
      for (let j = 0; j < len / 2; j++) {
        const uRe = re[i+j], uIm = im[i+j];
        const vRe = re[i+j+len/2]*cRe - im[i+j+len/2]*cIm;
        const vIm = re[i+j+len/2]*cIm + im[i+j+len/2]*cRe;
        re[i+j] = uRe+vRe; im[i+j] = uIm+vIm;
        re[i+j+len/2] = uRe-vRe; im[i+j+len/2] = uIm-vIm;
        const t = cRe*wRe - cIm*wIm;
        cIm = cRe*wIm + cIm*wRe; cRe = t;
      }
    }
  }
  if (inv) for (let i = 0; i < n; i++) { re[i] /= n; im[i] /= n; }
}

function fft2d(re2, im2, inv) {
  const row_re = new Float32Array(N);
  const row_im = new Float32Array(N);
  for (let r = 0; r < N; r++) {
    row_re.set(re2.subarray(r*N, r*N+N));
    row_im.set(im2.subarray(r*N, r*N+N));
    fft1d(row_re, row_im, inv);
    re2.set(row_re, r*N); im2.set(row_im, r*N);
  }
  const col_re = new Float32Array(N);
  const col_im = new Float32Array(N);
  for (let c = 0; c < N; c++) {
    for (let r = 0; r < N; r++) { col_re[r] = re2[r*N+c]; col_im[r] = im2[r*N+c]; }
    fft1d(col_re, col_im, inv);
    for (let r = 0; r < N; r++) { re2[r*N+c] = col_re[r]; im2[r*N+c] = col_im[r]; }
  }
}

function fftshift2(arr) {
  const h = N / 2, out = new Float32Array(N*N);
  for (let v = 0; v < N; v++)
    for (let u = 0; u < N; u++)
      out[v*N+u] = arr[((v+h)%N)*N + (u+h)%N];
  return out;
}

function runFFT() {
  ov.classList.add('show'); ovTxt.textContent = 'FFT 計算中...';
  // UI更新のためにタイマーで遅延実行
  setTimeout(() => {
    const re = new Float32Array(gray);
    const im = new Float32Array(N*N);
    fft2d(re, im, false);
    FR = fftshift2(re);
    FI = fftshift2(im);
    ov.classList.remove('show');
    drawFreq();
    drawWaveAndIFFT();
    updateProg();
  }, 50);
}

/* ── magnitude for display ── */
function getMagDisplay() {
  let mx = 0;
  const m = new Float32Array(N*N);
  for (let i = 0; i < N*N; i++) { m[i] = Math.sqrt(FR[i]*FR[i] + FI[i]*FI[i]); if (m[i] > mx) mx = m[i]; }
  const lmx = Math.log(1 + mx);
  for (let i = 0; i < N*N; i++) m[i] = Math.log(1 + m[i]) / lmx;
  return m;
}

let _magCache = null;
function getMag() { return _magCache || (_magCache = getMagDisplay()); }

/* ── draw frequency map ── */
function drawFreq() {
  const ctx = freqCv.getContext('2d');
  if (!FR) {
    ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, N, N);
    ctx.fillStyle = '#4a90d9'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('画像をロード', N/2, N/2); return;
  }
  const m = getMag();
  const id = ctx.createImageData(N, N);
  for (let i = 0; i < N*N; i++) {
    const b = Math.floor(m[i] * 255);
    const s = mask[i];
    const c = currentStrokeMask[i];
    
    // 背景の散乱強度を残しつつ色付け
    if (c) {
      // 直近のストローク（赤系）
      id.data[i*4  ] = Math.min(255, b + 150);
      id.data[i*4+1] = Math.max(0, b - 40);
      id.data[i*4+2] = Math.max(0, b - 40);
    } else if (s) {
      // 選択済み領域（青系）
      id.data[i*4  ] = Math.max(0, b - 50);
      id.data[i*4+1] = Math.max(0, b - 30);
      id.data[i*4+2] = Math.min(255, b + 150);
    } else {
      // 未選択（グレースケール）
      id.data[i*4  ] = b;
      id.data[i*4+1] = b;
      id.data[i*4+2] = b;
    }
    id.data[i*4+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

/* ── ターゲットのマスクを元にIFFTを計算するヘルパー ── */
function calcIFFT(targetMask, outRe) {
  const h = N / 2;
  const im2 = new Float32Array(N*N);
  outRe.fill(0);
  for (let v = 0; v < N; v++) {
    for (let u = 0; u < N; u++) {
      if (!targetMask[v*N+u]) continue;
      const sv = (v+h)%N, su = (u+h)%N;
      outRe[sv*N+su] = FR[v*N+u];
      im2[sv*N+su]   = FI[v*N+u];
    }
  }
  fft2d(outRe, im2, true);
}

/* ── 波形描画と合成描画 ── */
function drawWaveAndIFFT() {
  if (!FR) return;
  const reWave = new Float32Array(N*N);
  const reIfft = new Float32Array(N*N);

  calcIFFT(currentStrokeMask, reWave);
  calcIFFT(mask, reIfft);

  // ③ 最後に選択した波形の描画
  let mnW = Infinity, mxW = -Infinity;
  for (let i = 0; i < N*N; i++) { if (reWave[i] < mnW) mnW = reWave[i]; if (reWave[i] > mxW) mxW = reWave[i]; }
  const rngW = mxW - mnW || 1;
  const wCtx = waveCv.getContext('2d');
  const wId = wCtx.createImageData(N, N);
  const hasWave = currentStrokeMask.some(v => v);

  for (let i = 0; i < N*N; i++) {
    const v2 = hasWave ? Math.floor(255 * (reWave[i] - mnW) / rngW) : 0;
    // 波形は赤色っぽく着色（直近選択の赤と対応）
    wId.data[i*4  ] = Math.min(255, v2 + 40);
    wId.data[i*4+1] = Math.min(255, v2 >> 1);
    wId.data[i*4+2] = v2 >> 2;
    wId.data[i*4+3] = 255;
  }
  wCtx.putImageData(wId, 0, 0);

  // ④ 合成画像の描画 (グレースケール)
  let mnI = Infinity, mxI = -Infinity;
  for (let i = 0; i < N*N; i++) { if (reIfft[i] < mnI) mnI = reIfft[i]; if (reIfft[i] > mxI) mxI = reIfft[i]; }
  const rngI = mxI - mnI || 1;
  const iCtx = ifftCv.getContext('2d');
  const iId = iCtx.createImageData(N, N);
  const hasIfft = mask.some(v => v);

  for (let i = 0; i < N*N; i++) {
    const v2 = hasIfft ? Math.floor(255 * (reIfft[i] - mnI) / rngI) : 0;
    iId.data[i*4] = iId.data[i*4+1] = iId.data[i*4+2] = v2;
    iId.data[i*4+3] = 255;
  }
  iCtx.putImageData(iId, 0, 0);

  // テキストのオーバーレイ
  if (!hasWave) {
    wCtx.fillStyle = '#f66c6c'; wCtx.font = '14px sans-serif'; wCtx.textAlign = 'center';
    wCtx.fillText('領域をクリック・ドラッグ', N/2, N/2);
  }
  if (!hasIfft) {
    iCtx.fillStyle = '#4a90d9'; iCtx.font = '14px sans-serif'; iCtx.textAlign = 'center';
    iCtx.fillText('周波数を選択', N/2, N/2);
  }
}

function refresh() { drawFreq(); drawWaveAndIFFT(); updateProg(); }

function updateProg() {
  const sel = mask.reduce((a, b) => a+b, 0);
  const pct = Math.round(sel / mask.length * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = '選択済み: ' + pct + '%';
}

/* ── brush interaction ── */
function getCoord(e) {
  const r = freqCv.getBoundingClientRect();
  return {
    u: Math.floor((e.clientX - r.left) / r.width  * N),
    v: Math.floor((e.clientY - r.top)  / r.height * N)
  };
}

function applyBrush(u, v, doRefresh = true) {
  if (!FR) return;
  for (let dv = -bsz; dv <= bsz; dv++) {
    for (let du = -bsz; du <= bsz; du++) {
      if (du*du + dv*dv > bsz*bsz) continue;
      const pu = ((u+du) % N + N) % N;
      const pv = ((v+dv) % N + N) % N;
      const idx = pv*N + pu;
      mask[idx] = mode === 'erase' ? 0 : 1;
      if (mode === 'brush') currentStrokeMask[idx] = 1;
      else currentStrokeMask[idx] = 0;
    }
  }
  if (doRefresh) refresh();
}

freqSq.addEventListener('mousedown', e => {
  drag = true;
  if (mode === 'brush' || mode === 'erase') currentStrokeMask.fill(0);
  const {u,v} = getCoord(e);
  applyBrush(u,v);
});

// 重いIFFT処理が頻繁に走らないよう、requestAnimationFrameで間引く
freqSq.addEventListener('mousemove', e => {
  if (drag) {
    const {u,v} = getCoord(e);
    applyBrush(u,v, false);
    if (!isDrawing) {
      isDrawing = true;
      requestAnimationFrame(() => { refresh(); isDrawing = false; });
    }
  }
});
window.addEventListener('mouseup', () => { drag = false; });

freqSq.addEventListener('touchstart', e => {
  e.preventDefault(); drag = true;
  if (mode === 'brush' || mode === 'erase') currentStrokeMask.fill(0);
  const {u,v} = getCoord(e.touches[0]); applyBrush(u,v);
}, { passive: false });

freqSq.addEventListener('touchmove',  e => {
  e.preventDefault();
  if (drag) {
    const {u,v} = getCoord(e.touches[0]);
    applyBrush(u,v, false);
    if (!isDrawing) {
      isDrawing = true;
      requestAnimationFrame(() => { refresh(); isDrawing = false; });
    }
  }
}, { passive: false });
freqSq.addEventListener('touchend', () => { drag = false; });

/* ── demo image ── */
(function() {
  const tmp = document.createElement('canvas'); tmp.width = N; tmp.height = N;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#0a0a14'; tc.fillRect(0, 0, N, N);
  // スケールをN=256に合わせて倍増
  [{x:64,y:64,r:40},{x:180,y:76,r:28},{x:120,y:180,r:36},{x:50,y:180,r:20},{x:200,y:190,r:26}]
    .forEach(c => { tc.beginPath(); tc.arc(c.x,c.y,c.r,0,Math.PI*2); tc.fillStyle='white'; tc.fill(); });
  [60,128,196].forEach(y => { tc.fillStyle='rgba(255,255,255,0.55)'; tc.fillRect(12,y,N-24,4); });
  
  prevCv.getContext('2d').drawImage(tmp, 0, 0);
  const d = tc.getImageData(0,0,N,N).data;
  gray = new Float32Array(N*N);
  for (let i = 0; i < N*N; i++)
    gray[i] = (d[i*4]*.299 + d[i*4+1]*.587 + d[i*4+2]*.114) / 255;
  runFFT();
})();

})();
</script>
</body>
</html>
